services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api-heyundb
    restart: unless-stopped
    network_mode: host
    command: ["--log-dir", "/app/logs"]
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file:
      - .env.remote
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
